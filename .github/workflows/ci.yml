name: CI

# PR検証・レビュー・自動マージの統合ワークフロー
#
# フロー:
#   ├─ CI jobs (format, lint, typecheck, test)
#   ├─ renovate-review (author == renovate[bot])
#   ├─ code-review (author != renovate[bot])
#   ↓
#   ok (alls-green gate, 唯一のrequired check)
#   ↓
#   auto-merge (renovate-review成功時のみ)
#
# code-review失敗時（ワークフロー変更PR等）:
#   ok fail → 人間がレビューして手動マージ

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: write
  pull-requests: write
  issues: read
  id-token: write

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run format:check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run typecheck

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run test

  deploy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: pnpm/action-setup@91ab88e2619ed1f46221f0ba42d1492c02baf788 # v6.0.6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: npx wrangler deploy --dry-run --outdir dist

  renovate-review:
    if: github.event.pull_request.user.login == 'renovate[bot]'
    runs-on: ubuntu-latest
    outputs:
      approved: ${{ steps.gate.outputs.approved }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: koki-develop/claude-renovate-review@7e3883b2c3d9e93dc18fe065ad1315f9072b26de # v1.3.1
        id: review
        with:
          claude-code-oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed-tools: |
            WebSearch
            WebFetch(domain:github.com)
            WebFetch(domain:npm.pkg.github.com)
            WebFetch(domain:raw.githubusercontent.com)
            WebFetch(domain:www.npmjs.com)
            WebFetch(domain:nodejs.org)
            WebFetch(domain:hono.dev)
            WebFetch(domain:developers.cloudflare.com)
            WebFetch(domain:discord.com)
            WebFetch(domain:discord.js.org)
      - name: Gate
        id: gate
        if: always()
        env:
          SAFETY: ${{ steps.review.outputs.safety-assessment }}
        run: |
          if [[ "$SAFETY" == "safe" ]]; then
            echo "approved=true" >> "$GITHUB_OUTPUT"
          else
            echo "approved=false" >> "$GITHUB_OUTPUT"
            echo "::error::Renovate review: ${SAFETY:-unknown}"
            exit 1
          fi

  code-review:
    if: github.event.pull_request.user.login != 'renovate[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@476e359e6203e73dad705c8b322e333fabbd7416 # v1.0.119
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "*"
          use_sticky_comment: true
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            Review ALL changed files regardless of type (code, config, markdown, yaml, etc.):
            - Code: correctness, security, performance, best practices
            - Config/CI: validity, security implications, unintended side effects
            - Documentation: accuracy, consistency with codebase, completeness

            Use the repository's CLAUDE.md for style and conventions.

            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) for inline issues.
            Only post GitHub comments - don't submit review text as messages.

            After review, you MUST run exactly one of these commands:
            - `gh pr review ${{ github.event.pull_request.number }} --approve -b "LGTM"` (no blocking issues)
            - `gh pr review ${{ github.event.pull_request.number }} --request-changes -b "<summary>"` (blocking issues found)
            Skipping this step will break the CI pipeline. Base your verdict solely on your own analysis.
          claude_args: >-
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*)"

  ok:
    if: ${{ !cancelled() }}
    needs:
      - format
      - lint
      - typecheck
      - test
      - deploy-check
      - renovate-review
      - code-review
    runs-on: ubuntu-latest
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          jobs: ${{ toJSON(needs) }}
          allowed-skips: renovate-review,code-review

  auto-merge:
    if: >-
      !cancelled()
      && needs.ok.result == 'success'
      && needs.renovate-review.result == 'success'
    needs:
      - ok
      - renovate-review
    runs-on: ubuntu-latest
    steps:
      - run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ github.token }}
