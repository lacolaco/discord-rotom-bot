name: Update Pokemon Data

on:
  schedule:
    - cron: '0 0 * * 1' # 毎週月曜 00:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: true
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: 'package.json'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Update pokedex submodule
        run: |
          cd vendor/pokedex
          git fetch origin
          git checkout origin/master
      - run: npx tsx scripts/fetch-pokeapi-fallback.ts
      - run: npx tsx scripts/generate-pokemon-data.ts
      - name: Check for changes
        id: diff
        run: |
          git diff --exit-code src/pokeinfo/data.generated.json && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT
      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          BRANCH="chore/update-pokemon-data-$(date +%Y%m%d%H%M%S)"
          git checkout -b "$BRANCH"
          git add vendor/pokedex src/pokeinfo/data.generated.json src/pokeinfo/yakkun-map.json scripts/pokeapi-fallback.generated.json
          git commit -m "chore: update pokemon data from towakey/pokedex"
          git push origin "$BRANCH"
          gh pr create --title "chore: update pokemon data" --body "towakey/pokedex の最新データで data.generated.json を更新。"
